name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact_name: windows-x64
            dist_command: dist:win
            artifact_glob: |
              dist/*.exe
              dist/*.blockmap
          - platform: ubuntu-22.04
            artifact_name: linux-x64
            dist_command: dist
            artifact_glob: |
              dist/*.AppImage
              dist/*.deb
              dist/*.tar.gz

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            patchelf \
            wireshark-common \
            xvfb

      - name: Setup MSYS2
        if: matrix.platform == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            base-devel
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja

      - name: Install npm dependencies
        run: npm ci

      - name: Run AI harness tests
        run: npm run test:ai-harness

      - name: Bundle sharkd (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: npm run build:sharkd

      - name: Build sharkd from source (Windows)
        if: matrix.platform == 'windows-latest'
        shell: msys2 {0}
        run: |
          echo "=== Cloning Wireshark source ==="
          git clone --depth 1 --branch master https://gitlab.com/wireshark/wireshark.git /c/wireshark-src
          cd /c/wireshark-src

          echo "=== Installing Wireshark dependencies ==="
          tools/msys2-setup.sh --install-all --noconfirm

          echo "=== Building sharkd ==="
          mkdir build && cd build
          cmake -G Ninja \
            -DBUILD_wireshark=OFF \
            -DBUILD_tshark=OFF \
            -DBUILD_sharkd=ON \
            -DBUILD_dumpcap=OFF \
            -DBUILD_rawshark=OFF \
            -DBUILD_editcap=OFF \
            -DBUILD_capinfos=OFF \
            -DBUILD_mergecap=OFF \
            -DBUILD_reordercap=OFF \
            -DBUILD_text2pcap=OFF \
            -DBUILD_randpkt=OFF \
            -DENABLE_CCACHE=ON \
            ..
          ninja sharkd

      - name: Bundle sharkd (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $SharkdPaths = @(
            "C:\wireshark-src\build\run\sharkd.exe",
            "C:\wireshark-src\build\sharkd.exe"
          )

          $SharkdPath = $null
          foreach ($path in $SharkdPaths) {
            if (Test-Path $path) {
              $SharkdPath = $path
              break
            }
          }

          if (-not $SharkdPath) {
            Write-Error "sharkd.exe not found after build"
            exit 1
          }

          $WiresharkDir = Split-Path $SharkdPath
          powershell -ExecutionPolicy Bypass -File scripts/bundle-sharkd.ps1 `
            -SharkdPath $SharkdPath `
            -WiresharkDir $WiresharkDir

      - name: Validate bundled sharkd (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $BundleDir = "resources/sharkd"
          $Sharkd = Join-Path $BundleDir "sharkd-x86_64-pc-windows-msvc.exe"
          $Objdump = "C:\msys64\ucrt64\bin\objdump.exe"

          if (-not (Test-Path $Sharkd)) {
            throw "Missing bundled sharkd executable: $Sharkd"
          }

          if (-not (Test-Path $Objdump)) {
            throw "objdump not found at $Objdump"
          }

          $SystemDllRegex = '^(api-ms-win-|KERNEL32\.dll$|ADVAPI32\.dll$|IPHLPAPI\.dll$|SHELL32\.dll$|USER32\.dll$|OLE32\.dll$|OLEAUT32\.dll$|SECUR32\.dll$|CRYPT32\.dll$|BCRYPT\.dll$|WS2_32\.dll$|WSOCK32\.dll$|NTDLL\.dll$|UCRTBASE\.dll$|VCRUNTIME140(_1)?\.dll$|MSVCP140\.dll$)'
          $Imports = & $Objdump -p $Sharkd 2>$null |
            Select-String -Pattern '^\s*DLL Name:\s+(.+)$' |
            ForEach-Object { $_.Matches[0].Groups[1].Value.Trim() } |
            Select-Object -Unique

          $Missing = @()
          foreach ($dll in $Imports) {
            if ($dll -match $SystemDllRegex) { continue }
            if (-not (Test-Path (Join-Path $BundleDir $dll))) {
              $Missing += $dll
            }
          }

          if ($Missing.Count -gt 0) {
            Write-Host "Missing imported DLLs:"
            $Missing | ForEach-Object { Write-Host "  - $_" }
            throw "Windows sharkd bundle validation failed"
          }

          & $Sharkd -v | Out-Null
          if ($LASTEXITCODE -ne 0) {
            throw "sharkd smoke check failed with exit code $LASTEXITCODE"
          }

      - name: Build Electron app
        run: npm run ${{ matrix.dist_command }}

      - name: Run packaged smoke test
        run: npm run smoke:packaged -- --timeout-ms 60000

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packetpilot-${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: packetpilot-*
          merge-multiple: true
          path: release-artifacts

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PacketPilot ${{ github.ref_name }}
          draft: true
          prerelease: false
          files: release-artifacts/**
          body: |
            ## PacketPilot ${{ github.ref_name }}

            AI-powered network packet analyzer.

            ### Downloads
            - **Windows**: Download the `.exe` installer.
            - **Linux**: Download the `.AppImage`, `.deb`, or `.tar.gz` build.

            ### What's New
            See the [changelog](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
